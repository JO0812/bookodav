<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yohns/picocss@2.2.10/css/pico.min.css">
  <style>
    .error {
      color: #dc3545;
      padding: 1rem;
      border: 1px solid #dc3545;
      border-radius: 4px;
      margin: 1rem 0;

      ul {
        color: var(--pico-contrast-inverse);
      }
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .w3c {
      width: 64px;
    }
 
    .success {
      color: var(--pico-primary);
      padding: 1rem;
      border: 1px solid #28a745;
      border-radius: 4px;
      margin: 1rem 0;

      ul {
        color: var(--pico-contrast-inverse);
      }
    }

    .info {
      color: #17a2b8;
      padding: 0.5rem;
      margin: 0.5rem 0;

      ul {
        color: var(--pico-contrast-inverse);
      }
    }

    [role="alert"] {
      background-color: #f8d7da;
    }

    [role="status"] {
      background-color: #d4edda;
    }

    .progress-list {
      margin: 1rem 0;
    }

    .progress-row {
      margin-bottom: 0.75rem;
    }

    .progress-row progress {
      width: 100%;
      height: 1rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      opacity: 0.85;
    }
  </style>
  <title>BOOKO-DAV - Upload</title>
</head>

<body>
  <main class="container">
    <header class="container">
      <nav>
        <ul class="contrast">
          <li><strong>BOOKO-DAV</strong></li>
        </ul>
        <ul>
          <li><a href="/dav">Wiki</a></li>
          <li><a href="/dav/upload">Upload</a></li>
          <li><a href="/dav/list">View Docs</a></li>
        </ul>
      </nav>
    </header>
    <section>
      <h2>Upload Files</h2>
      <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
        <label for="files">Select files to upload:</label>
        <input type="file" id="files" name="files" required multiple
          accept=".epub,.pdf,.mobi,.cbr,.cbz,.jpg,.jpeg,.png,.gif,.webp">
        <!-- Use type="button" to prevent native submission -->
        <button type="submit" id="uploadButton">Upload</button>
      </form>
      <div id="progressList" class="progress-list"></div>
      <div id="uploadStatus"></div>
    </section>
    <footer class="footer">
      <span>
        <span id="year"></span> &copy; Joshua Rodrigues

      </span>
      <a href="https://html5.validator.nu/?doc=https%3A%2F%2Fbookodav.joshuarodrigues.dev">
        <img loading="lazy" class="w3c"
          src="https://github.com/bradleytaunt/html5-valid-badge/blob/master/html5-validator-badge-blue.png?raw=true"
          alt="HTML5 Valid">
      </a>
    </footer>
  </main>
  <script>
    const yearElement = document.querySelector("#year")
    const year = new Date().getFullYear()
    yearElement.innerHTML = year
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('uploadForm');
      const uploadStatus = document.getElementById('uploadStatus');
      const progressList = document.getElementById('progressList');
      const uploadButton = document.getElementById('uploadButton');
      const fileInput = document.getElementById('files');

      // Allowed file types from server configuration
      const allowedTypes = ['epub', 'pdf', 'mobi', 'cbr', 'cbz',
        'jpg', 'jpeg', 'png', 'gif', 'webp'];

      const SIMPLE_UPLOAD_LIMIT = 95 * 1024 * 1024;
      const MULTIPART_CHUNK_SIZE = 90 * 1024 * 1024;
      const MAX_FILE_SIZE = 20 * 1024 * 1024 * 1024;

      function showError(message) {
        uploadStatus.innerHTML = `<div class="error" role="alert">${message}</div>`;
        uploadStatus.scrollIntoView({ behavior: 'smooth' });
      }

      function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + units[i];
      }

      function makeProgressRow(file) {
        const row = document.createElement('div');
        row.className = 'progress-row';
        row.innerHTML = `
          <div class="progress-meta">
            <span class="name"></span>
            <span class="status">queued</span>
          </div>
          <progress value="0" max="100"></progress>
        `;
        row.querySelector('.name').textContent = `${file.name} (${formatBytes(file.size)})`;
        progressList.appendChild(row);
        const progressEl = row.querySelector('progress');
        const statusEl = row.querySelector('.status');
        return {
          setProgress(pct) { progressEl.value = Math.max(0, Math.min(100, pct)); },
          setStatus(text) { statusEl.textContent = text; },
          markError() { row.classList.add('error'); },
          markSuccess() { row.classList.add('success'); },
        };
      }

      function validateFiles(files) {
        const errors = [];
        const seenNames = new Set();

        if (files.length === 0) {
          errors.push('No files selected');
          return errors;
        }

        for (const file of files) {
          if (file.size > MAX_FILE_SIZE) {
            errors.push(`File exceeds 20GB safety cap: ${file.name} (${formatBytes(file.size)})`);
          }
          if (file.size === 0) {
            errors.push(`Empty file: ${file.name}`);
          }
          if (seenNames.has(file.name)) {
            errors.push(`Duplicate filename: ${file.name}`);
          }
          seenNames.add(file.name);
        }

        return errors;
      }

      // ----- Small-file path: existing multi-file /upload endpoint ----------
      async function uploadSimple(file, ui) {
        ui.setStatus('uploading');
        const formData = new FormData();
        formData.append('files', file);
        const res = await fetch('/upload', { method: 'POST', body: formData });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const entry = Array.isArray(data) ? data[0] : null;
        if (!entry || entry.status !== 'success') {
          throw new Error(entry?.error || 'Upload rejected');
        }
        ui.setProgress(100);
        ui.setStatus('done');
        ui.markSuccess();
        return entry.sanitizedFilename || file.name;
      }

      // ----- Large-file path: R2 multipart via /multipart/* ----------------
      async function uploadMultipart(file, ui) {
        const key = file.name.replace(/^\/+/, '');
        const totalParts = Math.ceil(file.size / MULTIPART_CHUNK_SIZE);

        ui.setStatus(`creating upload (${totalParts} parts)`);
        const createRes = await fetch(
          `/multipart/create?key=${encodeURIComponent(key)}`,
          { method: 'POST' }
        );
        if (!createRes.ok) throw new Error(`create failed (HTTP ${createRes.status})`);
        const { uploadId } = await createRes.json();

        const parts = [];
        try {
          for (let i = 0; i < totalParts; i++) {
            const partNumber = i + 1;
            const start = i * MULTIPART_CHUNK_SIZE;
            const end = Math.min(start + MULTIPART_CHUNK_SIZE, file.size);
            const blob = file.slice(start, end);

            ui.setStatus(`part ${partNumber}/${totalParts}`);
            const partRes = await fetch(
              `/multipart/part?key=${encodeURIComponent(key)}` +
              `&uploadId=${encodeURIComponent(uploadId)}` +
              `&partNumber=${partNumber}`,
              { method: 'PUT', body: blob }
            );
            if (!partRes.ok) {
              const txt = await partRes.text().catch(() => '');
              throw new Error(`part ${partNumber} failed (HTTP ${partRes.status}) ${txt}`);
            }
            const partInfo = await partRes.json();
            parts.push({ partNumber: partInfo.partNumber, etag: partInfo.etag });
            ui.setProgress(((i + 1) / totalParts) * 100);
          }

          ui.setStatus('finalizing');
          const completeRes = await fetch(
            `/multipart/complete?key=${encodeURIComponent(key)}` +
            `&uploadId=${encodeURIComponent(uploadId)}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ parts }),
            }
          );
          if (!completeRes.ok) {
            const txt = await completeRes.text().catch(() => '');
            throw new Error(`complete failed (HTTP ${completeRes.status}) ${txt}`);
          }

          ui.setProgress(100);
          ui.setStatus('done');
          ui.markSuccess();
          return key;
        } catch (err) {
          try {
            await fetch(
              `/multipart/abort?key=${encodeURIComponent(key)}` +
              `&uploadId=${encodeURIComponent(uploadId)}`,
              { method: 'DELETE' }
            );
          } catch { /* ignore */ }
          throw err;
        }
      }

      uploadButton.addEventListener('click', async function (e) {
        e.preventDefault();
        uploadStatus.innerHTML = '';
        progressList.innerHTML = '';

        const files = Array.from(fileInput.files);
        const validationErrors = validateFiles(files);
        if (validationErrors.length > 0) {
          showError(validationErrors.join('<br>'));
          return;
        }

        uploadButton.disabled = true;
        uploadButton.textContent = 'Uploading...';

        const successes = [];
        const failures = [];

        for (const file of files) {
          const ui = makeProgressRow(file);
          try {
            const name = file.size > SIMPLE_UPLOAD_LIMIT
              ? await uploadMultipart(file, ui)
              : await uploadSimple(file, ui);
            successes.push(name);
          } catch (err) {
            ui.setStatus(`failed: ${err.message}`);
            ui.markError();
            failures.push({ filename: file.name, error: err.message });
          }
        }

        let resultHtml = '';
        if (successes.length > 0) {
          resultHtml += `<div class="success" role="status">
                          <span>Successfully uploaded ${successes.length} files:</span>
                          <ul>${successes.map(n => `<li>${n}</li>`).join('')}</ul>
                         </div>`;
        }
        if (failures.length > 0) {
          resultHtml += `<div class="error" role="alert">
                           <p>Failed to upload ${failures.length} files:</p>
                           <ul>${failures.map(f => `<li>${f.filename}: ${f.error}</li>`).join('')}</ul>
                         </div>`;
        }
        uploadStatus.innerHTML = resultHtml;

        if (failures.length === 0) fileInput.value = '';

        try { await fetch('/dav/list', { headers: { 'Cache-Control': 'no-cache' } }); } catch {}

        uploadButton.disabled = false;
        uploadButton.textContent = 'Upload';
      });

      // Visual feedback for file selection
      fileInput.addEventListener('change', function () {
        if (this.files.length > 0) {
          uploadStatus.innerHTML = `<div class="info">Selected ${this.files.length} files</div>`;
        }
      });
    });
  </script>
</body>

</html>
